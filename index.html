<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 Money Tracker ✨</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Money Tracker ✨</h1>
            <p id="kawaiiMessage" class="subtitle">Loading cute message...</p>
            
            <select class="currency-select" id="currencySelect" onchange="changeCurrency()">
                <option value="INR">🇮🇳 ₹ INR</option>
                <option value="AUD">🇦🇺 A$ AUD</option>
                <option value="NPR">🇳🇵 ₨ NPR</option>
            </select>
        </header>

        <div class="tabs">
            <button class="tab active" onclick="showTab(0)">🏠 Dashboard</button>
            <button class="tab" onclick="showTab(1)">➕ Expense</button>
            <button class="tab" onclick="showTab(2)">💰 Income</button>
            <button class="tab" onclick="showTab(3)">📋 History</button>
        </div>

        <!-- Dashboard -->
        <div id="tab0" class="tab-content">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 15px;">
                <div class="card"><h3>💸 Expenses This Month</h3><div class="total" id="monthExpense">₹0.00</div></div>
                <div class="card"><h3>💰 Income This Month</h3><div class="total" id="monthIncome">₹0.00</div></div>
                <div class="card"><h3>🌸 Net Balance</h3><div class="total" id="netBalance">₹0.00</div></div>
            </div>

            <div class="card">
                <h3>🎯 Savings Goal</h3>
                <input type="text" id="goalName" placeholder="Goal Name (e.g. New Phone)">
                <input type="number" id="goalTarget" placeholder="Target Amount">
                <button onclick="setGoal()">Set Goal</button>
                <div id="goalProgress" style="margin-top:15px;font-weight:bold;"></div>
            </div>
        </div>

        <!-- Add Expense -->
        <div id="tab1" class="tab-content" style="display:none;">
            <div class="card">
                <h2>➕ Add Expense ✨</h2>
                <input type="text" id="expItem" placeholder="What did you buy?">
                <input type="number" id="expQty" value="1" min="1">
                <input type="number" id="expPrice" step="0.01" placeholder="Price">
                <input type="date" id="expDate">
                <input type="file" id="receiptPhoto" accept="image/*" onchange="previewPhoto(event)">
                <div id="photoPreview" style="margin:10px 0;"></div>
                <button onclick="addExpense()">Add Expense 💖</button>
                <button onclick="startVoice()" style="background:#9f7aea;">🎤 Voice Input</button>
            </div>
        </div>

        <!-- Add Income -->
        <div id="tab2" class="tab-content" style="display:none;">
            <div class="card">
                <h2>💰 Add Income 🌟</h2>
                <input type="text" id="incSource" placeholder="Source of money">
                <input type="number" id="incAmount" step="0.01" placeholder="Amount">
                <input type="date" id="incDate">
                <button onclick="addIncome()">Add Income 💰</button>
            </div>
        </div>

        <!-- History -->
        <div id="tab3" class="tab-content" style="display:none;">
            <div class="card">
                <h2>📋 All Transactions</h2>
                <table id="historyTable" style="width:100%;"></table>
            </div>
        </div>
    </div>

    <canvas id="confetti" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;display:none;"></canvas>

    <script src="app.js"></script>
</body>
</html>
